<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cos' week</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 100px repeat(14, minmax(100px, 1fr));
            grid-template-rows: 50px repeat(7, 100px);
            position: relative;
            background: white;
        }
        .label-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: sticky;
            z-index: 30;
        }
        .label-cell.top { top: 0; }
        .label-cell.left { left: 0; }
        .grid-cell {
            border: 1px solid #f1f5f9;
            position: relative;
            background: white;
        }
        .block {
            position: absolute;
            inset: 6px;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }
        .block:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 40;
        }
        .conflict {
            border: 3px solid #ef4444 !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        #modal.hidden { display: none; }
        #modal:not(.hidden) { display: flex; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-[1600px] mx-auto bg-white rounded-3xl shadow-2xl p-6 md:p-10 border border-slate-200" id="capture-area">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-10">
            <div>
                <h1 class="text-5xl font-black text-slate-900 tracking-tighter">Cos' week</h1>
                <p class="text-slate-500 font-semibold mt-2 text-lg">Your week, beautifully visualized.</p>
            </div>
            <div class="flex flex-wrap gap-4 w-full lg:w-auto">
                <button onclick="addBlock()" class="flex-1 lg:flex-none bg-indigo-600 text-white px-8 py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 font-black text-lg">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i> Add Event
                </button>
                <button onclick="downloadImage()" class="flex-1 lg:flex-none bg-white text-slate-700 border-2 border-slate-100 px-8 py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-all font-black text-lg">
                    <i data-lucide="download" class="w-6 h-6"></i> Save PNG
                </button>
                <button onclick="clearAll()" class="w-full lg:w-auto text-slate-400 hover:text-red-500 transition-colors font-bold px-4 py-2 text-sm uppercase tracking-widest">
                    Clear All
                </button>
            </div>
        </header>

        <div class="overflow-x-auto rounded-2xl border-2 border-slate-100 custom-scrollbar">
            <div id="scheduler" class="grid-container">
                <!-- Headers will be injected here -->
            </div>
        </div>
        
        <footer class="mt-10 pt-8 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">
            <div class="flex items-center gap-2">
                <span class="bg-slate-100 px-3 py-1 rounded-full text-slate-500">v2.0</span>
                <span>Cos' week Scheduler</span>
            </div>
            <span class="flex items-center gap-2">Built for high-performance humans <i data-lucide="zap" class="w-4 h-4 text-amber-400 fill-amber-400"></i></span>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-xl shadow-2xl border border-slate-100 scale-in-center">
            <div class="flex justify-between items-center mb-10">
                <h2 id="modalTitle" class="text-4xl font-black text-slate-900 tracking-tight">New Event</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-900 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            
            <div class="space-y-8">
                <div class="group">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.15em] mb-3 group-focus-within:text-indigo-500 transition-colors">Event Title</label>
                    <input type="text" id="eventTitle" placeholder="e.g. Deep Work Session" class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:ring-8 focus:ring-indigo-500/5 focus:border-indigo-500 transition-all font-bold text-xl text-slate-800 placeholder:text-slate-300">
                </div>
                
                <div class="grid grid-cols-2 gap-8">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.15em] mb-3">Day of Week</label>
                        <div class="relative">
                            <select id="eventDay" class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 transition-all font-bold text-lg text-slate-700 appearance-none">
                                <option value="1">Monday</option>
                                <option value="2">Tuesday</option>
                                <option value="3">Wednesday</option>
                                <option value="4">Thursday</option>
                                <option value="5">Friday</option>
                                <option value="6">Saturday</option>
                                <option value="7">Sunday</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.15em] mb-3">Start Hour</label>
                        <div class="relative">
                            <select id="eventStart" class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 transition-all font-bold text-lg text-slate-700 appearance-none"></select>
                            <i data-lucide="clock" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.15em] mb-3">Duration</label>
                    <div class="flex items-center gap-6 bg-slate-50 p-6 rounded-2xl border-2 border-slate-100">
                        <input type="range" id="eventDuration" min="1" max="8" value="1" class="flex-1 h-3 bg-slate-200 rounded-full appearance-none accent-indigo-600 cursor-pointer" oninput="document.getElementById('durVal').innerText = this.value + 'h'">
                        <span id="durVal" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black min-w-[70px] text-center text-xl shadow-lg shadow-indigo-100">1h</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.15em] mb-4">Pick a Style</label>
                    <div class="flex flex-wrap gap-5" id="colorPicker"></div>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between mt-12 gap-4">
                <button onclick="deleteEvent()" id="deleteBtn" class="flex items-center justify-center gap-2 text-red-500 font-black hover:bg-red-50 px-8 py-4 rounded-2xl transition-all border-2 border-transparent hover:border-red-100 hidden">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Delete
                </button>
                <div class="flex gap-4 ml-auto w-full sm:w-auto">
                    <button onclick="closeModal()" class="flex-1 sm:flex-none px-10 py-4 text-slate-400 font-black hover:text-slate-900 rounded-2xl transition-all">Cancel</button>
                    <button onclick="saveEvent()" class="flex-1 sm:flex-none px-12 py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-2xl shadow-indigo-200 transition-all text-xl">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scheduler = document.getElementById('scheduler');
        const modal = document.getElementById('modal');
        const timeStart = 8;
        const timeEnd = 22;
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const themes = [
            { bg: '#EFF6FF', border: '#3B82F6', text: '#1E40AF' },
            { bg: '#F0FDF4', border: '#22C55E', text: '#166534' },
            { bg: '#FEF2F2', border: '#EF4444', text: '#991B1B' },
            { bg: '#FFFBEB', border: '#F59E0B', text: '#92400E' },
            { bg: '#FAF5FF', border: '#A855F7', text: '#6B21A8' },
            { bg: '#FDF2F8', border: '#EC4899', text: '#9D174D' },
            { bg: '#F8FAFC', border: '#64748B', text: '#1E293B' }
        ];
        
        let events = JSON.parse(localStorage.getItem('cos_events_v3')) || [
            { id: 1, title: 'Computer Architecture', day: 1, start: 10, duration: 3, themeIdx: 0 },
            { id: 2, title: 'CS2 Training Session', day: 3, start: 20, duration: 2, themeIdx: 2 }
        ];
        let editingId = null;
        let selectedThemeIdx = 0;

        function init() {
            lucide.createIcons();
            renderGrid();
            renderEvents();
            populateTimeDropdowns();
            renderColorPicker();
        }

        function renderGrid() {
            scheduler.innerHTML = '<div class="label-cell top left">Day / Time</div>';
            for (let h = timeStart; h < timeEnd; h++) {
                const hCell = document.createElement('div');
                hCell.className = 'label-cell top';
                hCell.textContent = `${h}:00`;
                scheduler.appendChild(hCell);
            }

            days.forEach((day, idx) => {
                const dayCell = document.createElement('div');
                dayCell.className = 'label-cell left';
                dayCell.textContent = day;
                scheduler.appendChild(dayCell);

                for (let h = timeStart; h < timeEnd; h++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    scheduler.appendChild(cell);
                }
            });
        }

        function renderEvents() {
            document.querySelectorAll('.block').forEach(b => b.remove());
            events.forEach(event => {
                const theme = themes[event.themeIdx];
                const block = document.createElement('div');
                block.className = `block border-l-[6px]`;
                block.style.backgroundColor = theme.bg;
                block.style.borderColor = theme.border;
                block.style.color = theme.text;
                
                block.style.gridRow = event.day + 1;
                block.style.gridColumn = `${event.start - timeStart + 2} / span ${event.duration}`;
                
                block.innerHTML = `
                    <div class="font-black truncate uppercase text-[0.6rem] tracking-[0.1em] mb-1 opacity-60">${event.start}:00</div>
                    <div class="font-extrabold text-[0.85rem] leading-[1.1] mb-1">${event.title}</div>
                `;
                
                block.onclick = (e) => { e.stopPropagation(); openEditModal(event.id); };
                if (checkConflict(event)) block.classList.add('conflict');
                scheduler.appendChild(block);
            });
            localStorage.setItem('cos_events_v3', JSON.stringify(events));
        }

        function checkConflict(event) {
            return events.some(e => 
                e.id !== event.id && 
                e.day === event.day && 
                ((event.start >= e.start && event.start < e.start + e.duration) ||
                 (e.start >= event.start && e.start < event.start + event.duration))
            );
        }

        function populateTimeDropdowns() {
            const select = document.getElementById('eventStart');
            for (let i = timeStart; i < timeEnd; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `${i}:00`;
                select.appendChild(opt);
            }
        }

        function renderColorPicker() {
            const picker = document.getElementById('colorPicker');
            picker.innerHTML = '';
            themes.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.className = `w-14 h-14 rounded-2xl border-4 transition-all hover:scale-110 shadow-sm`;
                btn.style.backgroundColor = t.bg;
                btn.style.borderColor = (i === selectedThemeIdx) ? t.border : 'transparent';
                btn.onclick = () => {
                    selectedThemeIdx = i;
                    renderColorPicker();
                };
                picker.appendChild(btn);
            });
        }

        function addBlock() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'New Event';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDuration').value = 1;
            document.getElementById('durVal').innerText = '1h';
            document.getElementById('deleteBtn').classList.add('hidden');
            modal.classList.remove('hidden');
        }

        function openEditModal(id) {
            const event = events.find(e => e.id === id);
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Event';
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDay').value = event.day;
            document.getElementById('eventStart').value = event.start;
            document.getElementById('eventDuration').value = event.duration;
            document.getElementById('durVal').innerText = event.duration + 'h';
            document.getElementById('deleteBtn').classList.remove('hidden');
            selectedThemeIdx = event.themeIdx;
            renderColorPicker();
            modal.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value || 'Untitled Event';
            const day = parseInt(document.getElementById('eventDay').value);
            const start = parseInt(document.getElementById('eventStart').value);
            const duration = parseInt(document.getElementById('eventDuration').value);

            if (editingId) {
                const event = events.find(e => e.id === editingId);
                Object.assign(event, { title, day, start, duration, themeIdx: selectedThemeIdx });
            } else {
                events.push({ id: Date.now(), title, day, start, duration, themeIdx: selectedThemeIdx });
            }
            renderEvents();
            closeModal();
        }

        function deleteEvent() {
            if (editingId && confirm('Delete this event?')) {
                events = events.filter(e => e.id !== editingId);
                renderEvents();
                closeModal();
            }
        }

        function clearAll() {
            if (confirm('Clear your entire schedule?')) {
                events = [];
                renderEvents();
            }
        }

        function downloadImage() {
            const element = document.getElementById('capture-area');
            html2canvas(element, { scale: 3, backgroundColor: '#f8fafc', borderRadius: 30 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-cos-week.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        init();
    </script>
</body>
</html>
